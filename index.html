<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pro Typing Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu(this)">
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="title">Typing Game</div>

  <button onclick="showPage('game')">Game</button>
  <button onclick="showPage('history')">History</button>

  <button onclick="toggleMode()">Change Mode</button>
  <button onclick="toggleKeyboard()">Keyboard</button>

</div>

<!-- CONTENT -->
<div class="content">

  <div id="gamePage">

    <div class="top">
      <div>WPM: <span id="wpm">0</span></div>
      <div>Accuracy: <span id="accuracy">100</span>%</div>
      <div>Mode: <span id="modeText">words</span></div>
    </div>

    <div id="sentence" class="sentence"></div>
    <div id="typed"></div>

    <canvas id="wpmChart"></canvas>

    <div id="keyboard"></div>

  </div>

  <div id="historyPage" style="display:none;">
    <h2>History</h2>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
