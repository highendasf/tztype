<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing App</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">

  <div class="top">
    <span><b id="wpm">0</b> WPM</span>
    <span><b id="time">0</b>s</span>
    <span>best: <b id="highScore">0</b></span>
  </div>

  <div class="mode">
    <button id="sentenceModeBtn">Sentence</button>
    <button id="wordModeBtn">Words</button>
  </div>

  <div id="sentence" class="sentence"></div>
  <div id="typed" class="typed"></div>

  <button onclick="startGame()">Start</button>
  <button id="toggleKeyboardBtn">Hide Keyboard</button>

  <canvas id="wpmChart"></canvas>

  <div id="keyboard"></div>

</div>

<script src="script.js"></script>

</body>
</html>
