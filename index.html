<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Game</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- TOP -->
  <div class="top">
    <span><b id="wpm">0</b> WPM</span>
    <span><b id="time">0</b>s</span>
    <span>acc: <b id="accuracy">100</b>%</span>
    <span>best: <b id="highScore">0</b></span>
  </div>

  <!-- MODE SWITCH -->
  <div class="mode">
    <button id="sentenceModeBtn">Sentence Mode</button>
    <button id="wordModeBtn">Word Mode</button>
  </div>

  <!-- TEXT -->
  <div id="sentence" class="sentence"></div>
  <div id="typed" class="typed"></div>

  <button onclick="startGame()">Start</button>

  <!-- GRAPH -->
  <canvas id="wpmChart"></canvas>

  <!-- TOGGLE KEYBOARD -->
  <button id="toggleKeyboardBtn">Hide Keyboard</button>

  <!-- KEYBOARD -->
  <div id="keyboard"></div>

</div>

<script src="script.js"></script>

</body>
</html>
