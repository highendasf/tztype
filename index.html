<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TZType</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <button onclick="toggleMenu(this)">☰</button>

  <div class="controls">
    <button onclick="setMode('words')">Words</button>
    <button onclick="setMode('sentences')">Sentences</button>
    <button onclick="setMode('one')">1 Word</button>
    <button onclick="toggleKeyboard()">Keyboard</button>
  </div>

</div>

<!-- GAME -->
<div id="game">

  <div id="sentence"></div>
  <div id="typed"></div>

</div>

<!-- STATS -->
<div class="stats">
  <div>WPM: <span id="wpm">0</span></div>
  <div>ACC: <span id="accuracy">100</span>%</div>
</div>

<!-- GRAPH -->
<canvas id="wpmChart"></canvas>

<!-- KEYBOARD -->
<div id="keyboard"></div>

<!-- SCRIPT -->
<script src="keyboard.js"></script>
<script src="script.js"></script>

</body>
</html>
