<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TZType</title>

  <!-- CACHE FIX -->
  <link rel="stylesheet" href="style.css?v=1.1.0">
</head>

<body>

<div class="app">

  <div class="top">
    <span>WPM: <b id="wpm">0</b></span>
    <span>Time: <b id="time">0</b></span>
    <span>Acc: <b id="accuracy">100</b>%</span>
    <span>Best: <b id="highScore">0</b></span>
  </div>

  <div id="sentence" class="sentence"></div>
  <div id="typed" class="typed"></div>

  <canvas id="wpmChart"></canvas>

  <button onclick="toggleKeyboard()">Show / Hide Keyboard</button>

  <div id="keyboard"></div>

  <button onclick="startGame()">Start</button>

</div>

<script src="script.js?v=1.1.0"></script>

</body>
</html>
