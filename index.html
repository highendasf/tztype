<!DOCTYPE html>
<html>
<head>
  <title>TZType Rebuild</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button id="menuBtn" onclick="toggleMenu(this)">☰</button>

  <div class="controls">
    <button onclick="setMode('words')">Words</button>
    <button onclick="setMode('sentences')">Sentences</button>
    <button onclick="setMode('oneword')">1 Word</button>
    <button onclick="toggleKeyboard()">Keyboard</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="sentence"></div>
  <div id="typed"></div>
</div>

<!-- STATS -->
<div class="stats">
  <div>WPM: <span id="wpm">0</span></div>
  <div>ACC: <span id="accuracy">100</span>%</div>
</div>

<!-- GRAPH (FIXED ID) -->
<canvas id="wpmChart"></canvas>

<!-- KEYBOARD -->
<div id="keyboard"></div>

<!-- MAIN SCRIPT (ONLY ONCE!) -->
<script src="script.js"></script>

<!-- DEBUG CONSOLE -->
<div id="debugConsole" style="
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 200px;
  overflow: auto;
  background: rgba(0,0,0,0.9);
  color: #00ff88;
  font-size: 12px;
  font-family: monospace;
  z-index: 99999;
  display: none;
  padding: 10px;
"></div>

<script>
const debugBox = document.getElementById("debugConsole");

function log(msg) {
  if (!debugBox) return;

  debugBox.style.display = "block";
  debugBox.innerHTML += msg + "<br>";
  debugBox.scrollTop = debugBox.scrollHeight;
}

const oldLog = console.log;
console.log = function (...args) {
  oldLog(...args);
  log(args.join(" "));
};

window.onerror = function (msg, src, line) {
  log("ERROR: " + msg + " @ " + line);
};
</script>

</body>
</html>
