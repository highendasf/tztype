<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TZType</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-top">
      <div class="title">Typing Game</div>

      <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <button onclick="showPage('game')" class="active">Game</button>
    <button onclick="showPage('history')">History</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- GAME -->
    <div class="app" id="gamePage">

      <div class="top">
        <span>WPM: <b id="wpm">0</b></span>
        <span>Acc: <b id="accuracy">100</b>%</span>
        <span>Best: <b id="highScore">0</b></span>
      </div>

      <div id="sentence" class="sentence"></div>
      <div id="typed" class="typed" tabindex="0"></div>

      <div class="legend">
        <span class="wpm-dot">● WPM</span>
        <span class="acc-dot">● Accuracy</span>
      </div>

      <canvas id="wpmChart"></canvas>

      <div class="controls">
        <button onclick="toggleMode()">Mode: <span id="modeLabel">Words</span></button>
        <button onclick="toggleKeyboard()">Keyboard</button>
        <span class="shortcut">TAB</span>
      </div>

      <div id="keyboard"></div>

      <button onclick="startGame()">Start</button>
    </div>

    <!-- HISTORY -->
    <div class="app" id="historyPage" style="display:none;">
      <h2>History</h2>
      <div id="historyBox"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
